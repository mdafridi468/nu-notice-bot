name: NU Notice Checker

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs automatically every 15 minutes
  workflow_dispatch:        # Allows manual testing button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 PyMuPDF

      - name: Run Notice Bot Script
        env:
          WEBHOOK_EXAM: ${{ secrets.WEBHOOK_EXAM }}
          WEBHOOK_ADMISSION: ${{ secrets.WEBHOOK_ADMISSION }}
          WEBHOOK_NOTICE: ${{ secrets.WEBHOOK_NOTICE }}
          WEBHOOK_RESULTS: ${{ secrets.WEBHOOK_RESULTS }}
          WEBHOOK_NEWS: ${{ secrets.WEBHOOK_NEWS }}
        run: python bot.py

      - name: Save Notice History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_notices.json || true
          git diff --staged --quiet || (git commit -m "Update sent notices history" && git push)
